name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check src/

      - name: Format check
        run: uv run ruff format --check src/

      - name: Run tests
        run: uv run pytest tests/ -v

  push-to-acr:
    needs: lint
    runs-on: ubuntu-latest

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name hyfregistry

      - name: Build and push
        run: |
          docker build --platform linux/amd64 -t hyfregistry.azurecr.io/${{ github.event.repository.name }}:${{ github.sha }} .
          docker push hyfregistry.azurecr.io/${{ github.event.repository.name }}:${{ github.sha }}
